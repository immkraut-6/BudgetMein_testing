<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
  <title>BudgetMein - Offline</title>
  <style>
    :root {
      --card: rgba(255,255,255,.08);
      --accent: #ff4500;
      --text: #ffffff;
      --muted: rgba(255,255,255,.72);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Poppins, Arial, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(255,69,0,.28), transparent 35%),
        linear-gradient(160deg, #1a1a2e, #2c1a40 55%, #311100);
      color: var(--text);
    }
    .card {
      width: min(100%, 420px);
      padding: 28px 24px;
      border-radius: 24px;
      background: var(--card);
      backdrop-filter: blur(10px);
      text-align: center;
      box-shadow: 0 18px 60px rgba(0,0,0,.28);
    }
    .badge {
      width: 72px;
      height: 72px;
      margin: 0 auto 18px;
      border-radius: 20px;
      display: grid;
      place-items: center;
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, #ff4500, #cc3700);
    }
    h1 { margin: 0 0 10px; font-size: 1.7rem; }
    p { margin: 0 0 20px; color: var(--muted); line-height: 1.6; }
    button {
      border: none;
      border-radius: 999px;
      padding: 13px 20px;
      background: linear-gradient(135deg, #ff4500, #cc3700);
      color: #fff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">OFFLINE</div>
    <h1>You're offline</h1>
    <p>BudgetMein needs an internet connection to load the latest menu and place orders. Reconnect and try again.</p>
    <button type="button" onclick="location.reload()">Try Again</button>
  </main>
</body>
</html>
